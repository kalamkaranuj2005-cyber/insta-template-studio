services:
  - type: web
    name: insta-template-studio-api
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FREE_TIER_WATERMARK
        value: "true"
      - key: CORS_ORIGIN
        value: "*"
